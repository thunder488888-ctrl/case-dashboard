    }

    /* ── Institution summary cards ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .card {
      background: white; border-radius: 10px;
      padding: 14px 12px 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      border-top: 4px solid;
      transition: transform 0.15s;

    .card .unit { font-size: 12px; color: #a0aec0; margin-top: 2px; }
    .card .trend {
      font-size: 11px; margin-top: 6px;
      padding: 2px 6px; border-radius: 10px; display: inline-block;

    .trend-up   { background: #fef2f2; color: #e53e3e; }
    .trend-down { background: #f0fff4; color: #38a169; }
    .trend-same { background: #f7fafc; color: #718096; }

    /* ── Charts row ── */
    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;

      background: white; border-radius: 10px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .chart-box h3 {
      font-size: 13px; color: #4a5568; margin-bottom: 12px;
      font-weight: 700; padding-bottom: 8px; border-bottom: 1px solid #e2e8f0;
    }
    .chart-wrap { position: relative; height: 220px; }

    /* ── Supervisor detail section ── */
    .section-title {
      font-size: 14px; font-weight: 700; color: #4a5568;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .sup-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .sup-card {
      background: white; border-radius: 10px;
      padding: 14px 14px 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      border-top: 3px solid;
    }
    .sup-card .inst-label {
      font-size: 11px; font-weight: 700; color: #4a5568;
      margin-bottom: 10px; padding-bottom: 7px;
      border-bottom: 1px solid #e2e8f0;
    }
    .sup-table { width: 100%; border-collapse: collapse; }
    .sup-table tr { border-bottom: 1px solid #f0f4f8; }
    .sup-table tr:last-child { border-bottom: none; }
    .sup-table td {
      padding: 5px 2px;
      font-size: 11.5px;
      vertical-align: middle;
    }
    .sup-table td:first-child {
      color: #4a5568;
      width: 60%;
    }
    .sup-table td.count-cell {
      text-align: right;
      font-weight: 700;
      color: #2d3748;
      white-space: nowrap;
      width: 28px;
    }
    .sup-table td.bar-cell { width: 40%; padding-left: 6px; }
    .bar-bg {
      background: #edf2f7; border-radius: 4px; height: 6px; overflow: hidden;
    }
    .bar-fill { height: 6px; border-radius: 4px; transition: width 0.4s; }

    /* ── Supervisor district expand/collapse ── */
    .sup-table tr.sup-row.has-dist { cursor: pointer; }
    .sup-table tr.sup-row.has-dist:hover { background: #f8fafc; }
    .sup-name-cell { display: flex; align-items: center; gap: 5px; }
    .toggle-ico {
      display: inline-block; flex: 0 0 auto;
      width: 11px; font-size: 9px; color: #a0aec0;
      transition: transform 0.15s; line-height: 1;
    }
    tr.sup-row.open .toggle-ico { transform: rotate(90deg); color: #4a5568; }
    .detail-row > td { padding: 3px 2px 8px 18px !important; }
    .district-list { display: flex; flex-wrap: wrap; gap: 5px; }
    .district-chip {
      font-size: 10.5px; background: #f1f5f9; color: #475569;
      border-radius: 10px; padding: 2px 8px; white-space: nowrap;
    }
    .district-chip b { color: #1e293b; margin-left: 3px; font-weight: 700; }

    /* ── No data ── */
    .no-data-msg { text-align: center; padding: 50px 20px; color: #a0aec0; }
    .no-data-msg .icon { font-size: 36px; margin-bottom: 10px; }
    .no-data-msg p { font-size: 13px; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .sup-grid { grid-template-columns: repeat(3, 1fr); }

    @media (max-width: 750px) {
      .cards-grid { grid-template-columns: repeat(3, 1fr); }
      .charts-row { grid-template-columns: 1fr; }

    }
    @media (max-width: 480px) {

    }

<!-- ── Header ── -->
<div class="header">
  <div>
    <h1>🏠 居服督導個案數量儀表板</h1>
    <div class="subtitle">統計範圍：服務中狀態 × 案號開頭 A / B / C</div>
  </div>
  <div class="updated" id="updated-label">尚未取得資料</div>
</div>

<!-- ── Institution total cards ── -->
<div class="cards-grid" id="cards-container"></div>

<!-- ── Charts ── -->
<div class="charts-row">
  <div class="chart-box">
    <h3>📊 本週各機構個案數比較</h3>
    <div class="chart-wrap"><canvas id="barChart"></canvas></div>
  </div>
  <div class="chart-box">
    <h3>📈 歷週趨勢</h3>
    <div class="chart-wrap"><canvas id="lineChart"></canvas></div>
  </div>
</div>

<!-- ── Supervisor detail section ── -->
<div class="section-title">📋 各督導員案量明細（本週）<span style="font-size:11px;font-weight:400;color:#94a3b8;margin-left:4px">點擊督導員可展開各行政區案量</span></div>
<div class="sup-grid" id="sup-container"></div>

<script>
// ── 顏色配置 ─────────────────────────────────────────────────────────────────
const COLORS = {
  "平安居家（高雄）" : { border: "#1976d2", bg: "rgba(25,118,210,0.12)",  bar: "#1976d2" },
  "健康居家"         : { border: "#2e7d32", bg: "rgba(46,125,50,0.12)",   bar: "#2e7d32" },
  "快樂居家"         : { border: "#e65100", bg: "rgba(230,81,0,0.12)",    bar: "#e65100" },
  "惠群居家"         : { border: "#6a1b9a", bg: "rgba(106,27,154,0.12)",  bar: "#6a1b9a" },
  "臺東健康居家"     : { border: "#00838f", bg: "rgba(0,131,143,0.12)",   bar: "#00838f" },
};
const BORDER_COLORS = Object.values(COLORS).map(c => c.border);
const BG_COLORS     = Object.values(COLORS).map(c => c.bg);

// ── 讀取資料 ─────────────────────────────────────────────────────────────────
const { lastUpdated, history } = DASHBOARD_DATA;
const hasData = history && history.length > 0;

// ── 更新時間標籤 ─────────────────────────────────────────────────────────────
if (lastUpdated) {
  const d = new Date(lastUpdated);
  const pad = n => String(n).padStart(2, "0");
  document.getElementById("updated-label").textContent =
    `最後更新：${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// ── 機構總計卡片 ─────────────────────────────────────────────────────────────
function renderCards() {
  const container = document.getElementById("cards-container");
  if (!hasData) {
    container.innerHTML = `
      <div class="no-data-msg" style="grid-column:1/-1">
        <div class="icon">📭</div>
        <p>尚無資料<br>每週一早上 8 點排程任務執行後將自動更新</p>
      </div>`;
    return;
  }
  const latest    = history[0].institutions;
  const prev      = history.length > 1 ? history[1].institutions : null;
  const instNames = Object.keys(latest);
  const topColors = Object.values(COLORS);

  instNames.forEach((name, i) => {
    const total = latest[name];
    const color = topColors[i] || { border: "#718096" };
    let trendHTML = "";
    if (prev && prev[name] != null && total != null) {
      const diff = total - prev[name];
      if (diff > 0)      trendHTML = `<span class="trend trend-up">▲ ${diff}</span>`;
      else if (diff < 0) trendHTML = `<span class="trend trend-down">▼ ${Math.abs(diff)}</span>`;
      else               trendHTML = `<span class="trend trend-same">─ 持平</span>`;
    }
    const card = document.createElement("div");
    card.className = "card";
    card.style.borderTopColor = color.border;
    card.innerHTML = `
      <div class="inst-name">${name}</div>
      <div class="total" style="color:${color.border}">${total ?? "—"}</div>
      <div class="unit">個案（服務中）</div>
      ${trendHTML}`;
    container.appendChild(card);
  });
}

// ── 督導明細區塊 ─────────────────────────────────────────────────────────────
function renderSupervisors() {
  const container = document.getElementById("sup-container");
  if (!hasData) {
    container.innerHTML = `
      <div class="no-data-msg" style="grid-column:1/-1">
        <div class="icon">📋</div><p>尚無資料</p>
      </div>`;
    return;
  }

  const latest     = history[0];
  const instNames  = Object.keys(latest.institutions);
  const supData    = latest.supervisors || {};
  const topColors  = Object.values(COLORS);

  instNames.forEach((instName, i) => {
    const color = topColors[i] || { border: "#718096", bar: "#718096" };
    const sups  = supData[instName] || {};

    // 正規化：每位督導值可能是數字（舊格式）或 {count, districts}（新格式）
    const entries = Object.entries(sups).map(([supName, val]) => {
      if (val && typeof val === "object") {
        return { name: supName, count: val.count ?? 0, districts: val.districts || null };
      }
      return { name: supName, count: val ?? 0, districts: null };
    });
    const maxVal = Math.max(...entries.map(e => e.count), 1);

    let rows = "";
    entries.forEach(({ name: supName, count: cnt, districts }) => {
      const pct = Math.round((cnt / maxVal) * 100);
      const hasDist = districts && Object.keys(districts).length > 0;
      const ico = hasDist
        ? `<span class="toggle-ico">▶</span>`
        : `<span class="toggle-ico" style="visibility:hidden">▶</span>`;
      rows += `
        <tr class="sup-row${hasDist ? " has-dist" : ""}">
          <td><div class="sup-name-cell">${ico}<span>${supName}</span></div></td>
          <td class="count-cell">${cnt}</td>
          <td class="bar-cell">
            <div class="bar-bg">
              <div class="bar-fill" style="width:${pct}%;background:${color.bar}"></div>
            </div>
          </td>
        </tr>`;
      if (hasDist) {
        const chips = Object.entries(districts)
          .map(([d, n]) => `<span class="district-chip">${d}<b>${n}</b></span>`)
          .join("");
        rows += `
        <tr class="detail-row" style="display:none">
          <td colspan="3"><div class="district-list">${chips}</div></td>
        </tr>`;
      }
    });

    if (!rows) {
      rows = `<tr><td colspan="3" style="color:#a0aec0;font-size:11px;padding:8px 0">無資料</td></tr>`;
    }

    const card = document.createElement("div");
    card.className = "sup-card";
    card.style.borderTopColor = color.border;
    card.innerHTML = `
      <div class="inst-label">${instName}</div>
      <table class="sup-table">${rows}</table>`;
    container.appendChild(card);
  });

  // 點擊督導列 → 展開/收合該列下方的行政區明細
  container.querySelectorAll("tr.sup-row.has-dist").forEach(row => {
    row.addEventListener("click", () => {
      const detail = row.nextElementSibling;
      if (!detail || !detail.classList.contains("detail-row")) return;
      const isOpen = detail.style.display !== "none";
      detail.style.display = isOpen ? "none" : "";
      row.classList.toggle("open", !isOpen);
    });
  });
}

// ── 長條圖（本週比較）────────────────────────────────────────────────────────
function renderBarChart() {
  const ctx = document.getElementById("barChart");
  if (!hasData) {
    ctx.parentElement.innerHTML = `<div class="no-data-msg"><div class="icon">📊</div><p>尚無資料</p></div>`;
    return;
  }
  const latest   = history[0].institutions;
  const labels   = Object.keys(latest);
  const vals     = labels.map(n => latest[n] ?? 0);
  const colors   = labels.map((n, i) => BORDER_COLORS[i] || "#718096");
  const bgColors = labels.map((n, i) => BG_COLORS[i] || "rgba(0,0,0,0.1)");

  new Chart(ctx, {
    type: "bar",
    data: {
      labels,
      datasets: [{ label: "個案數", data: vals,
        backgroundColor: bgColors, borderColor: colors,
        borderWidth: 2, borderRadius: 6 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y} 筆` } }
      },
      scales: {
        y: { beginAtZero: true, grid: { color: "rgba(0,0,0,0.05)" }, ticks: { font: { size: 11 } } },
        x: { grid: { display: false }, ticks: { font: { size: 10 }, maxRotation: 20 } }
      }
    }
  });
}

// ── 折線圖（歷週趨勢）────────────────────────────────────────────────────────
function renderLineChart() {
  const ctx = document.getElementById("lineChart");
  if (!hasData || history.length < 2) {
    ctx.parentElement.innerHTML = `<div class="no-data-msg"><div class="icon">📈</div><p>累積 2 週以上資料後<br>將顯示趨勢圖</p></div>`;
    return;
  }
  const slice     = history.slice(0, 12).reverse();
  const labels    = slice.map(h => h.label || h.week);
  const instNames = Object.keys(history[0].institutions);
  const colorList = Object.values(COLORS);

  const datasets = instNames.map((name, i) => ({
    label: name,
    data: slice.map(h => h.institutions[name] ?? null),
    borderColor: colorList[i]?.border || "#718096",
    backgroundColor: colorList[i]?.bg || "rgba(0,0,0,0.05)",
    borderWidth: 2, pointRadius: 4, pointHoverRadius: 6,
    tension: 0.3, fill: false, spanGaps: true,
  }));

  new Chart(ctx, {
    type: "line",
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { position: "bottom", labels: { font: { size: 10 }, boxWidth: 12, padding: 8 } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}：${ctx.parsed.y} 筆` } }
      },
      scales: {
        y: { beginAtZero: false, grid: { color: "rgba(0,0,0,0.05)" }, ticks: { font: { size: 11 } } },
        x: { grid: { display: false }, ticks: { font: { size: 10 } } }
      }
    }
  });
}

// ── 初始化 ────────────────────────────────────────────────────────────────────
renderCards();
renderBarChart();
renderLineChart();
renderSupervisors();
</script>
